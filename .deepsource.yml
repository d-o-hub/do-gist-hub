version: 1

exclude_patterns:
  - 'dist/**'
  - 'node_modules/**'
  - 'analysis/**'

analyzers:
  javascript:
    enabled: true
    checks:
      disabled:
        - "no-void"                        # void operator is idiomatic for TypeScript floating promises
        - "complexity"                     # cyclomatic complexity — app.ts event delegation is intentional
        - "no-implicit-globals"            # module-level functions required by Vite plugin API
