version: 1

exclude_patterns:
  - 'dist/**'
  - 'node_modules/**'
  - 'analysis/**'

analyzers:
  javascript:
    enabled: true
    checks:
      disabled:
        - "JS-0044"  # void operator is idiomatic for TypeScript floating promises
        - "JS-0010"  # cyclomatic complexity — app.ts event delegation is intentional
        - "JS-0027"  # module-level functions required by Vite plugin API
