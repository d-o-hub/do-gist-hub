version: 1

exclude_patterns:
  - 'dist/**'
  - 'node_modules/**'
  - 'analysis/**'

analyzers:
  javascript:
    enabled: true
    checks:
      disabled:
        - "JS-0128"  # void operator is idiomatic for TypeScript floating promises
        - "JS-0102"  # module-level functions required by Vite plugin API
        - "JS-0032"  # cyclomatic complexity — app.ts event delegation is intentional
        - "JS-0091"  # expected undefined, saw void — void is correct floating promise pattern
