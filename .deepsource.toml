version = 1

test_patterns = [
  'tests/**',
]

exclude_patterns = [
  'dist/**',
  'android/**',
  'ios/**',
  'node_modules/**',
  'coverage/**',
  '*.config.ts',
  '*.config.js',
]

[[analyzers]]
name = 'javascript'
enabled = true

  [analyzers.meta]
  runtime_version = 22

  [[analyzers.linters]]
  name = 'eslint'
  enabled = true

  [analyzers.linters.rules]
  'no-var' = 'off'
  'eqeqeq' = 'off'
  'prefer-arrow-callback' = 'off'
  'no-empty' = 'off'

[[analyzers]]
name = 'shell'
enabled = true