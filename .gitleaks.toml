# Gitleaks configuration file
# For more information, see https://github.com/gitleaks/gitleaks

[extend]
# Inherit Gitleaks default rules
useDefault = true

[allowlist]
description = "Allow known false positives and non-sensitive files"
paths = [
    '''examples/.*''',
    '''.pre-commit-config.yaml''',
    '''public/offline.html''',
    '''tests/.*''',
    '''agents-docs/.*''',
    # Architectural docs only, no credentials
    '''plans/.*\.md''',
    # Generated test outputs (Stryker mutation HTML reports)
    '''reports/.*\.(html|json|xml)$''',
]
