<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 2026: Background gradient using updated design tokens (tonal elevation) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#1a1a1f"/>
    </linearGradient>
    
    <!-- 2026: Desaturated blue glow for dark mode -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Subtle outer glow -->
    <filter id="outerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feFlood flood-color="#60a5fa" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="100" height="100" fill="url(#bgGrad)" rx="18"/>
  
  <!-- 2026: Desaturated blue circle (blue.400 for dark mode comfort) -->
  <circle cx="50" cy="50" r="36" fill="#60a5fa" filter="url(#glow)" opacity="0.95"/>
  
  <!-- Subtle ring around circle -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#93c5fd" stroke-width="0.5" opacity="0.3"/>
  
  <!-- 2026: {} symbol with JetBrains Mono style -->
  <text x="50" y="59" font-size="42" font-family="'JetBrains Mono', 'Courier New', monospace" font-weight="600" text-anchor="middle" fill="#fafafa" letter-spacing="0.5">{}</text>
  
  <!-- 2026: Three dots representing Gist items (slightly larger, better spacing) -->
  <circle cx="34" cy="76" r="3.5" fill="#d4d4d8" opacity="0.9"/>
  <circle cx="50" cy="76" r="3.5" fill="#d4d4d8" opacity="0.9"/>
  <circle cx="66" cy="76" r="3.5" fill="#d4d4d8" opacity="0.9"/>
</svg>
