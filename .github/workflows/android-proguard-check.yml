# Implements plan 038 item F6: Android ProGuard CI smoke check
# Runs assembleRelease with --dry-run to validate ProGuard config without signing

name: Android ProGuard Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  proguard-check:
    name: ProGuard Smoke Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # pinned from v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # pinned from v9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web App and Sync Android
        run: pnpm run build:android

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # pinned from v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # pinned from v4
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Dry-run ProGuard Release Build
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --dry-run --stacktrace 2>&1 | tee ../proguard-dry-run.log

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # pinned from v7
        if: always()
        with:
          name: proguard-dry-run-output
          path: proguard-dry-run.log
          retention-days: 7
