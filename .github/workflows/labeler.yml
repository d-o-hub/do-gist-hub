name: Labeler

on:
  - pull_request_target

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Apply Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # pinned from v6.1.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
