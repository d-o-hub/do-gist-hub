# Implements plan 038 item D6 — mutation testing
name: Mutation Testing

on:
  schedule:
    - cron: '00 06 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stryker:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Stryker Mutation Tests
        run: pnpm exec stryker run stryker.config.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # pinned from v7
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7
