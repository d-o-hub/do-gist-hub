name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee  # pinned from v4.2.0
        with:
          release-type: node
          package-name: d-o-gist-hub
          token: ${{ secrets.GITHUB_TOKEN }}
