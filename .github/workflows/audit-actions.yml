name: Audit GitHub Actions

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Audit Action Node Runtimes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Audit actions for deprecated Node runtimes
        id: audit
        run: |
          set -euo pipefail

          DEPRECATED=""
          EXCEPTIONS="gitleaks/gitleaks-action ludeeus/action-shellcheck wagoid/commitlint-github-action"
          # EXCEPTION RATIONALE:
          #   gitleaks/gitleaks-action: latest is v2.3.9 (node20); no v3 release available yet
          #   ludeeus/action-shellcheck: docker-based action, no Node runtime
          #   wagoid/commitlint-github-action: docker-based action, no Node runtime

          # Extract all uses: lines, deduplicate
          ACTIONS=$(grep -rhoP 'uses:\s+\K[^/\s]+/[^@\s]+@[^\s]+' .github/workflows/ || true)

          for ref in $ACTIONS; do
            ACTION=$(echo "$ref" | cut -d'@' -f1)
            VERSION=$(echo "$ref" | cut -d'@' -f2)

            # Skip local/relative paths
            if [[ "$ACTION" == .* ]] || [[ "$ACTION" == \/* ]]; then
              continue
            fi

            # Skip exceptions (non-Node or known blockers)
            if echo "$EXCEPTIONS" | grep -qw "$ACTION"; then
              echo "⚠️  SKIPPED (exception): $ref"
              continue
            fi

            # Fetch action.yml to determine runtime
            RUNTIME=$(curl -sL --fail "https://raw.githubusercontent.com/${ACTION}/${VERSION}/action.yml" 2>/dev/null | grep -oP 'using:\s*\K\S+' || echo "unknown")

            if [[ "$RUNTIME" == "node16" ]] || [[ "$RUNTIME" == "node20" ]]; then
              echo "❌ DEPRECATED ($RUNTIME): $ref"
              DEPRECATED="${DEPRECATED}- $ref ($RUNTIME)\n"
            elif [[ "$RUNTIME" == "node24" ]] || [[ "$RUNTIME" == "composite" ]] || [[ "$RUNTIME" == "docker" ]]; then
              echo "✅ OK ($RUNTIME): $ref"
            else
              echo "⚠️  UNKNOWN ($RUNTIME): $ref"
            fi

            # Rate-limit friendly: sleep briefly between requests
            sleep 0.5
          done

          if [[ -n "$DEPRECATED" ]]; then
            echo ""
            echo "::error::Deprecated Node runtimes detected:"
            echo -e "$DEPRECATED"
            {
              echo "deprecated_actions<<EOF"
              echo -e "$DEPRECATED"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo ""
            echo "✅ No deprecated Node runtimes found."
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const deprecated = `${{ steps.audit.outputs.deprecated_actions }}`;
            const title = 'ci: deprecated Node.js runtimes detected in GitHub Actions';
            const bodyLines = [
              '## Deprecated Actions Audit Result',
              '',
              'The monthly audit found GitHub Actions still using deprecated Node.js runtimes. These must be bumped to node24-native versions before GitHub removes the forced-run fallback.',
              '',
              '### Affected Actions',
              deprecated,
              '',
              '### Next Steps',
              '1. Identify the latest major version for each action that uses node24.',
              '2. Bump the version in the relevant workflow file(s).',
              '3. Verify via curl against raw action.yml.',
              '4. Validate YAML syntax with python yaml.safe_load.',
              '5. Push and monitor CI.',
              '',
              'See plans/adr-015-ci-node24-android-hardening.md and AGENTS.md CI/CD Maintenance Rules for the full remediation playbook.',
            ];
            const body = bodyLines.join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci,deprecated-runtime',
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci'],
              });
              console.log(`Created issue #${created.number}`);
            }
