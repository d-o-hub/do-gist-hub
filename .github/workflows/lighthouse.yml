---
name: Lighthouse CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lighthouse:
    name: Web Vitals Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # pinned from v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build app
        run: pnpm run build
      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
