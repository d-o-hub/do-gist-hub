name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level high
      - name: ShellCheck all scripts
        run: shellcheck --severity=warning scripts/*.sh scripts/lib/*.sh
      - name: Run Quality Gate
        run: pnpm run quality

  tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # pinned from v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests (shard ${{ matrix.shard }} of 3)
        run: pnpm exec playwright test --project=chromium --shard=${{ matrix.shard }}/3
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # pinned from v7
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}-of-3
          path: playwright-report/
          retention-days: 7

  android-debug-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # pinned from v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # pinned from v4
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Web App and Sync Android
        run: pnpm run build:android
      - name: Build Android Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: Upload Debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # pinned from v7
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  android-fdroid-build:
    name: Android F-Droid Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # pinned from v4.0.1
        id: filter
        with:
          filters: |
            fdroid:
              - 'android/**'
              - '.fdroid.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'src/**'
              - 'capacitor.config.ts'
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        if: steps.filter.outputs.fdroid == 'true'
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        if: steps.filter.outputs.fdroid == 'true'
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # pinned from v5
        if: steps.filter.outputs.fdroid == 'true'
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # pinned from v4
        if: steps.filter.outputs.fdroid == 'true'
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
      - name: Install dependencies
        if: steps.filter.outputs.fdroid == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build Web App and Sync Android
        if: steps.filter.outputs.fdroid == 'true'
        run: pnpm run build:android
      - name: Build Android F-Droid APK
        if: steps.filter.outputs.fdroid == 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleFdroid --stacktrace
      - name: Verify F-Droid APK exists
        if: steps.filter.outputs.fdroid == 'true'
        run: |
          # The fdroid variant is declared as a buildType (not a productFlavor) in
          # android/app/build.gradle, so AGP emits the APK directly to
          # apk/fdroid/ — no flavor subfolder, no build-type subfolder.
          # The expected path is also pinned in .fdroid.yml (output:).
          APK=android/app/build/outputs/apk/fdroid/app-fdroid-unsigned.apk
          ls -la "$APK"
          file "$APK"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # pinned from v7
        if: always() && steps.filter.outputs.fdroid == 'true'
        with:
          name: app-fdroid-unsigned-apk
          path: android/app/build/outputs/apk/fdroid/app-fdroid-unsigned.apk
          retention-days: 7

  bundle-budget:
    name: Bundle Budget
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Ensure analysis directory exists
        run: mkdir -p analysis
      - name: Build with bundle analyzer and performance budgets
        run: ANALYZE=true pnpm run build
      - name: Check bundle size against budget
        run: pnpm run bundle-budget
      - name: Run Lighthouse CI (performance + accessibility budgets)
        if: github.event_name == 'pull_request'
        run: npx @lhci/cli@0.14.x autorun --config=.lighthouserc.json --collect.staticDistDir=dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # pinned from v7
        with:
          name: bundle-analysis
          path: |
            analysis/bundle-stats.html
            .lighthouseci/
          retention-days: 7

  quick-tests:
    name: Quick Unit Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # pinned from v4.0.1
        id: filter
        with:
          filters: |
            unit:
              - 'src/**/*.ts'
              - 'src/**/*.tsx'
              - 'tests/unit/**/*.ts'
              - 'tests/unit/**/*.tsx'
              - 'vitest.config.ts'
              - 'tsconfig*.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        if: steps.filter.outputs.unit == 'true'
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        if: steps.filter.outputs.unit == 'true'
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        if: steps.filter.outputs.unit == 'true'
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        if: steps.filter.outputs.unit == 'true'
        run: pnpm exec vitest run --reporter=verbose

  sha-pin-audit:
    name: SHA-Pin Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - name: Audit GitHub Actions SHA pins
        run: |
          chmod +x scripts/sha-pin-actions.sh
          ./scripts/sha-pin-actions.sh
          # Check if the script modified any files (would mean floating tags exist)
          if ! git diff --quiet -- .github/workflows/; then
            echo "❌ Some workflow files have unpinned action versions."
            echo "Run ./scripts/sha-pin-actions.sh locally to fix."
            git diff -- .github/workflows/
            exit 1
          else
            echo "✅ All actions are SHA-pinned."
          fi

  visual-tests:
    name: Visual Regression Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Visual Tests
        run: pnpm run test:visual
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # pinned from v7
        if: always()
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 30
