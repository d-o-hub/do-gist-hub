name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe02b34f77f8bc70378873c9b5efc7cffc8f6fc4 # v4.1.1
        with:
          version: 9
      - uses: actions/setup-node@1d0e46989172994d5ca6814a451cafddfedb6d8b # v4.2.0
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run npm audit
        run: pnpm audit
      - name: Run Quality Gate
        run: pnpm run quality

  tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe02b34f77f8bc70378873c9b5efc7cffc8f6fc4 # v4.1.1
        with:
          version: 9
      - uses: actions/setup-node@1d0e46989172994d5ca6814a451cafddfedb6d8b # v4.2.0
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        run: |
          pnpm run test:browser
          pnpm run test:mobile
          pnpm run test:offline
          pnpm run test:a11y
      - uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3 # v4.3.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  android-debug-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe02b34f77f8bc70378873c9b5efc7cffc8f6fc4 # v4.1.1
        with:
          version: 9
      - uses: actions/setup-node@1d0e46989172994d5ca6814a451cafddfedb6d8b # v4.2.0
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Set up JDK 17
        uses: actions/setup-java@7a6d6caa0dcf36bd6e83831f8772a8ee9f30aef5 # v4.7.0
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build Web App and Sync Android
        run: pnpm run build:android
      - name: Build Android Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload Debug APK
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3 # v4.3.1
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  visual-tests:
    name: Visual Regression Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe02b34f77f8bc70378873c9b5efc7cffc8f6fc4 # v4.1.1
        with:
          version: 9
      - uses: actions/setup-node@1d0e46989172994d5ca6814a451cafddfedb6d8b # v4.2.0
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Visual Tests
        run: pnpm run test:visual
      - uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3 # v4.3.1
        if: always()
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 30
