name: Version Propagation

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  propagate:
    name: Propagate Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Update README.md badge
        run: |
          sed -i "s/version-[^-]*-blue.svg/version-${{ steps.version.outputs.VERSION }}-blue.svg/" README.md
      - name: Update CHANGELOG.md header if unreleased section exists
        run: |
          # If the first section is ## [Unreleased], update any version placeholder
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "0,/\[Unreleased\]/s//[$VERSION]/" CHANGELOG.md || true
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: propagate version ${{ steps.version.outputs.VERSION }} to docs"
            git push
          else
            echo "No version changes to propagate."
          fi
