name: Version Propagation

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  propagate:
    name: Propagate Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pinned from v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Read VERSION
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Update README.md badge
        run: |
          sed -i "s/version-[^-]*-blue.svg/version-${{ steps.version.outputs.VERSION }}-blue.svg/" README.md
      - name: Update CHANGELOG.md header if unreleased section exists
        run: |
          # If the first section is ## [Unreleased], update any version placeholder
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "0,/\[Unreleased\]/s//[$VERSION]/" CHANGELOG.md || true
      - name: Update package.json version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          node -e "
            const fs = require('fs');
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (pkg.version !== VERSION) {
              pkg.version = VERSION;
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              console.log('Updated package.json version to ' + VERSION);
            } else {
              console.log('package.json version already matches: ' + VERSION);
            }
          "
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md package.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: propagate version ${{ steps.version.outputs.VERSION }} to docs and package.json"
            git push
          else
            echo "No version changes to propagate."
          fi
