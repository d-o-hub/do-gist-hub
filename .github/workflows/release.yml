name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned from v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # pinned from v6
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # pinned from v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # pinned from v4
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Read VERSION
        id: version
        run: echo "VERSION=$(< VERSION)" >> "$GITHUB_OUTPUT"
      - name: Build Web App
        run: pnpm run build
      - name: Build Web ZIP
        run: zip -r web-app.zip dist/
      - name: Build Android Debug APK
        run: |
          pnpm run build:android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # pinned from v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            web-app.zip
            android/app/build/outputs/apk/debug/app-debug.apk
