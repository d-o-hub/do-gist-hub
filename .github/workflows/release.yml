name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # pinned from v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # pinned from v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # pinned from v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # pinned from v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # pinned from v4
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Read VERSION
        id: version
        run: echo "VERSION=$(< VERSION)" >> "$GITHUB_OUTPUT"
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # pinned from v4
        with:
          config: cliff.toml
          args: --latest --verbose
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}
      - name: Read changelog
        id: changelog-body
        run: |
          {
            echo 'changelog<<EOFCHANGELOG'
            cat CHANGELOG_RELEASE.md
            echo 'EOFCHANGELOG'
          } >> "$GITHUB_OUTPUT"
      - name: Build Web App
        run: pnpm run build
      - name: Build Web ZIP
        run: zip -r web-app.zip dist/
      - name: Build Android Debug APK
        run: |
          pnpm run build:android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: ProGuard Compilation Smoke Check
        run: |
          cd android
          chmod +x gradlew
          ./gradlew compileReleaseSources --stacktrace
      - name: Firebase Test Lab — Robo Test (smoke)
        if: env.FIREBASE_TESTLAB_JSON != ''
        env:
          FIREBASE_TESTLAB_JSON: ${{ secrets.FIREBASE_TESTLAB_JSON }}
        uses: vacxe/firebase-test-lab-action@bab7fe412819d0ac601b64c288ee0819a91ccf91  # pinned from v0.0.6
        with:
          service-account: ${{ secrets.FIREBASE_TESTLAB_JSON }}
          apk: android/app/build/outputs/apk/debug/app-debug.apk
          test: ''
          device-id: 'Pixel7'
          os-version-id: '34'
          robo-directives: ''
      - name: Decode Keystore and Build Release APK + AAB
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          cd android
          # ANDROID_KEYSTORE_PATH is resolved by app/build.gradle's
          # `rootProject.file()` call relative to the android/ directory.
          ANDROID_KEYSTORE_PATH=app/keystore.jks \
          ANDROID_KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
          ANDROID_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
          ANDROID_KEY_PASSWORD="$ANDROID_KEY_PASSWORD" \
          ./gradlew assembleRelease --stacktrace || true
          # AAB signing is broken in AGP 8.3.2 (NPE in FinalizeBundleTask
          # when System.getenv-derived signingConfig is used) — see
          # google/agi/issues/289398400. Run it but don't fail the step
          # if it errors; the APK is the primary release artifact.
          ./gradlew bundleRelease --stacktrace || echo "AAB build failed (known AGP 8.3.2 NPE); continuing without AAB"
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # pinned from v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog-body.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          fail_on_unmatched_files: false
          files: |
            web-app.zip
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
