name: Workflow Template

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  template-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Example step with env block
        run: |
          echo "The value of MY_VAR is $MY_VAR"
        env:
          # CRITICAL: Always define environment variables in the step-level env: block
          # This prevents issues with external tools and ensures clarity.
          MY_VAR: ${{ secrets.MY_SECRET_VARIABLE }}
